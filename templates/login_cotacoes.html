<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema de Cotações</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .login-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .login-box h2 { text-align: center; color: #333; }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .error { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Acesso Restrito</h2>
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form action="/consulta/login" method="POST">
            <input type="text" name="username" placeholder="Usuário" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>

<script src="{{ url_for('static', filename='js/consulta_cotacao.js') }}"></script>
</body>
</html>
