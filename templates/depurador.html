<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhamento do Cálculo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="depurador-container">
        <h2>Depurador de Cálculo</h2>
        <div class="search-container" style="margin-bottom: 20px; padding: 10px;">
            <label for="inputNumero">Consulta Cotação:</label>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <input type="text" id="inputNumero" placeholder="Digite o número da cotação" style="width: 200px; padding: 8px;">
                <button onclick="buscarCotacao()" style="padding: 8px 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
                    Buscar
                </button>
            </div>
        </div>
        <table id="depurador-table">
            <thead>
                <tr>
                    <th>Numero da Cotação</th>
                    <th>Versão</th>
                    <th>Data Cotação</th>
                    <th>Fonte</th>
                    <th>Pergunta</th>
                    <th>Resposta</th>
                    <th>Relatividade</th>
                    <th>Prêmio</th>
                </tr>
            </thead>
            <tbody id="tabCorpo">
            </tbody>
        </table>
    </div>

    <div class="export-container">
        <button id="export-excel" class="btn-export">Exportar para Excel</button>
    </div>

    <a href="/painel" class="btn-voltar_upload" style="color: rgb(218, 9, 9);">← Voltar ao Painel</a>

    <script>
        function buscarCotacao() {
            const numero = document.getElementById("inputNumero").value.trim();
            if (!numero) {
                alert("Digite um número de cotação válido.");
                return;
            }

            fetch("/consulta/api/depurador", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: `numero_cotacao=${encodeURIComponent(numero)}`
            })
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById("tabCorpo");
                tbody.innerHTML = "";

                if (data.error) {
                    alert(data.error);
                    return;
                }

                data.linhas.forEach(linha => {
                    const tr = document.createElement("tr");
                    if (linha.fonte && linha.fonte.toLowerCase().includes("prêmio")) {
                        tr.classList.add("linha-premio");
                    }
                    tr.innerHTML = `
                        <td>${linha.numero_cotacao}</td>
                        <td>${linha.versao_cotacao}</td>
                        <td>${linha.data_criacao_cotacao}</td>
                        <td>${linha.fonte || ""}</td>
                        <td>${linha.pergunta || ""}</td>
                        <td>${linha.resposta || ""}</td>
                        <td>${linha.relatividade || ""}</td>
                        <td>${linha.premio != null ? linha.premio.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) : ""}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error("Erro:", err);
                alert("Erro ao buscar cotação.");
            });
        }

        document.getElementById('export-excel').addEventListener('click', function() {
            const table = document.getElementById('depurador-table');
            const wb = XLSX.utils.table_to_book(table, {
                sheet: "Depurador",
                raw: true
            });
            const numeroCotacao = document.getElementById("inputNumero").value.trim() || "cotacao";
            XLSX.writeFile(wb, `Cotacao_${numeroCotacao}.xlsx`, {
                bookType: 'xlsx',
                type: 'array'
            });
        });
    </script>

    <style>
        .btn-export {
            background-color: #58a77b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 25px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .btn-export:hover {
            background-color: #169b56;
        }
        .export-container {
            text-align: right;
            margin: 25px 0;
            padding-right: 10px;
        }
    </style>
</body>
</html>
