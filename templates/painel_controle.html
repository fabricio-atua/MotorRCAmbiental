<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle</title>
    <style>
        /* Definindo o fundo com logo e transparência */
        body {
            position: relative;
            margin: 0;
            padding-top: 50px;
            color: #fff;
            text-align: center;
            min-height: 100vh;
            /* cor de fundo caso queira um tom por baixo do logo */
            background-color: rgba(31, 77, 228, 0.2);
            overflow-x: hidden;
            }

            /* pseudo‑elemento que carrega o logo e recebe opacity */
            body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /*background-image: url('static/img/logo.webp');*/
            background-size: 80% auto;        /* ajusta o tamanho do logo */
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.1;                      /* transparência no logo */
            z-index: -1;                       /* fica atrás do conteúdo */
            }

        h1 {
            margin-bottom: 40px;
            color: #000000;  /* Cor do título para visibilidade */
            font-family: 'Mollen', sans-serif; /* Altera o tipo de fonte */
            font-size: 50pt; /* Aumenta o tamanho da fonte */
        }

        .painel-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        .painel-item {
            background-color: rgb(243, 240, 240);
            border: 1px solid #ddd;
            border-radius: 10px;
            width: 300px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            box-shadow: 0 2px 5px  rgba(69, 109, 243, 0.8); 
            transition: 0.3s;
            font-family: 'Mollen', sans-serif; /* Altera o tipo de fonte */
        }

        .painel-item:hover {
            background-color: #aeb5c0;
            transform: scale(1.05);
        }

        .logout {
            margin-top: 250px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #f30909;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Mollen', sans-serif; /* Altera o tipo de fonte */
        }

        .logout:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>
    <h1>Painel de Controle</h1>
  
    <div class="painel-container">
      {% if perfil == 'admin' %}
        <a href="/depurador" class="painel-item">🔧 Depurador</a>
        <a href="/upload_tabelas" class="painel-item">📁 Importar Tabelas</a>
        <a href="/versao_tabelas" class="painel-item">📊 Versão das Tabelas</a>
        <a href="/consulta/cotacoes" class="painel-item">💰 Consulta Cotações</a>
      {% endif %}
  
      {% if perfil == 'user' %}
        <a href="/consulta/cotacoes" class="painel-item">💰 Consulta Cotações</a>
      {% endif %}
    </div>
  
    <a href="/consulta/logout" class="logout">🚪 Sair</a>
  </body>
  
</html>
